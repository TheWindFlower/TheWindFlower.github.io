<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gather Carousel</title>
</head>
<body>

  <!-- ✅ Fixed-size container — drop this anywhere in your project -->
  <div id="carousel-container">
    <div class="stage">
      <div class="carousel-track" id="track"></div>
      <div class="content">
        <h1>Gather here</h1>
        <div class="nav">
          <button onclick="move(-1)">❮</button>
          <button onclick="move(1)">❯</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
